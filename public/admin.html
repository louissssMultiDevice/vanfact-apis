<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Panel - VanFact API">
    <meta name="theme-color" content="#0f0f1a">
    
    <title>Admin Panel | VanFact API</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2912/2912780.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --dark: #0a0a0f;
            --darker: #050508;
            --card: #12121a;
            --card-hover: #1a1a25;
            --border: #2a2a3a;
            --text: #f8fafc;
            --text-muted: #64748b;
            --text-secondary: #94a3b8;
            --gradient-1: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--darker);
            color: var(--text);
            line-height: 1.6;
        }
        
        /* Login Screen */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--darker);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .login-screen.hidden {
            display: none;
        }
        
        .login-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .login-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
        }
        
        .login-input {
            width: 100%;
            background: var(--dark);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            color: var(--text);
            font-size: 1rem;
            margin-bottom: 1rem;
            text-align: center;
            letter-spacing: 0.5rem;
        }
        
        .login-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn-login {
            width: 100%;
            background: var(--gradient-1);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
        }
        
        /* Layout */
        .admin-layout {
            display: none;
        }
        
        .admin-layout.active {
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--dark);
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        
        .sidebar-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .nav-menu {
            padding: 1rem 0;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        
        .nav-item:hover,
        .nav-item.active {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border-left-color: var(--primary);
        }
        
        .nav-item i {
            width: 20px;
            text-align: center;
        }
        
        .badge {
            margin-left: auto;
            background: var(--error);
            color: white;
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
            min-width: 20px;
            text-align: center;
        }
        
        .badge.success { background: var(--success); }
        .badge.warning { background: var(--warning); }
        
        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        
        .page-title h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.75rem;
            margin-bottom: 0.25rem;
        }
        
        .page-title p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .header-actions {
            display: flex;
            gap: 1rem;
        }
        
        .btn-icon {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .btn-icon:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .btn-icon .indicator {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 10px;
            height: 10px;
            background: var(--error);
            border-radius: 50%;
            border: 2px solid var(--card);
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
        }
        
        .stat-label {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }
        
        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Content Sections */
        .content-section {
            display: none;
        }
        
        .content-section.active {
            display: block;
        }
        
        /* Request List */
        .request-list {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }
        
        .request-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .request-item:hover {
            background: var(--card-hover);
        }
        
        .request-item:last-child {
            border-bottom: none;
        }
        
        .request-status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        
        .status-pending { background: var(--warning); }
        .status-approved { background: var(--success); }
        .status-rejected { background: var(--error); }
        .status-in_progress { background: var(--accent); }
        .status-completed { background: var(--primary); }
        
        .request-info {
            flex: 1;
            min-width: 0;
        }
        
        .request-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .request-meta {
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        
        .request-date {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        /* Request Detail Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        
        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .btn-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .modal-body {
            padding: 1.5rem;
        }
        
        .detail-group {
            margin-bottom: 1.5rem;
        }
        
        .detail-label {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        
        .detail-value {
            font-size: 1rem;
        }
        
        .code-block {
            background: var(--dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            overflow-x: auto;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .modal-footer {
            display: flex;
            gap: 1rem;
            padding: 1.5rem;
            border-top: 1px solid var(--border);
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-success {
            background: var(--success);
            color: white;
        }
        
        .btn-warning {
            background: var(--warning);
            color: var(--dark);
        }
        
        .btn-error {
            background: var(--error);
            color: white;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-secondary {
            background: var(--dark);
            color: var(--text);
            border: 1px solid var(--border);
        }
        
        /* Notification Panel */
        .notification-panel {
            display: none;
            position: absolute;
            top: 60px;
            right: 2rem;
            width: 380px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }
        
        .notification-panel.active {
            display: block;
        }
        
        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
        }
        
        .notification-title {
            font-weight: 600;
        }
        
        .notification-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .notification-item {
            display: flex;
            gap: 1rem;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .notification-item:hover {
            background: var(--card-hover);
        }
        
        .notification-item.unread {
            border-left: 3px solid var(--primary);
        }
        
        .notification-icon {
            width: 40px;
            height: 40px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            flex-shrink: 0;
        }
        
        .notification-content {
            flex: 1;
        }
        
        .notification-text {
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }
        
        .notification-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        /* Broadcast Form */
        .broadcast-form {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .form-input,
        .form-textarea {
            width: 100%;
            background: var(--dark);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.875rem 1rem;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
        }
        
        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }
        
        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
            }
            
            .main-content {
                margin-left: 0;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 640px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .modal {
                margin: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <div class="login-logo">
                <i class="fas fa-lock"></i>
                Admin Panel
            </div>
            <input type="password" class="login-input" id="adminKey" placeholder="••••••" maxlength="20">
            <button class="btn-login" onclick="login()">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </div>
    </div>
    
    <!-- Admin Layout -->
    <div class="admin-layout" id="adminLayout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-rocket"></i>
                    VanFact API
                </div>
            </div>
            
            <nav class="nav-menu">
                <div class="nav-item active" onclick="showSection('dashboard')">
                    <i class="fas fa-chart-line"></i>
                    Dashboard
                </div>
                <div class="nav-item" onclick="showSection('requests')">
                    <i class="fas fa-inbox"></i>
                    Requests
                    <span class="badge" id="requestBadge">0</span>
                </div>
                <div class="nav-item" onclick="showSection('notifications')">
                    <i class="fas fa-bell"></i>
                    Send Notification
                </div>
                <div class="nav-item" onclick="showSection('settings')">
                    <i class="fas fa-cog"></i>
                    Settings
                </div>
                <div class="nav-item" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </div>
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <div class="page-header">
                <div class="page-title">
                    <h1 id="pageTitle">Dashboard</h1>
                    <p id="pageSubtitle">Overview sistem</p>
                </div>
                <div class="header-actions">
                    <button class="btn-icon" onclick="toggleNotifications()">
                        <i class="fas fa-bell"></i>
                        <span class="indicator" id="notifIndicator"></span>
                    </button>
                    <button class="btn-icon" onclick="refreshData()">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>
            
            <!-- Notification Panel -->
            <div class="notification-panel" id="notificationPanel">
                <div class="notification-header">
                    <span class="notification-title">Notifications</span>
                    <button class="btn-close" onclick="toggleNotifications()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="notification-list" id="notificationList">
                    <!-- Dynamic -->
                </div>
            </div>
            
            <!-- Dashboard Section -->
            <div class="content-section active" id="dashboardSection">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Total Requests</div>
                        <div class="stat-value" id="totalRequests">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Pending</div>
                        <div class="stat-value" id="pendingRequests" style="color: var(--warning);">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Completed</div>
                        <div class="stat-value" id="completedRequests" style="color: var(--success);">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total API Calls</div>
                        <div class="stat-value" id="totalApiCalls">0</div>
                    </div>
                </div>
            </div>
            
            <!-- Requests Section -->
            <div class="content-section" id="requestsSection">
                <div class="request-list" id="requestList">
                    <!-- Dynamic -->
                </div>
            </div>
            
            <!-- Notifications Section -->
            <div class="content-section" id="notificationsSection">
                <div class="broadcast-form">
                    <div class="form-group">
                        <label class="form-label">Judul Notifikasi</label>
                        <input type="text" class="form-input" id="notifTitle" placeholder="Contoh: Fitur Baru Tersedia!">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Pesan</label>
                        <textarea class="form-textarea" id="notifMessage" placeholder="Tulis pesan notifikasi..."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tipe</label>
                        <select class="form-input" id="notifType">
                            <option value="global">Global (Semua User)</option>
                            <option value="broadcast">Broadcast</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="sendNotification()">
                        <i class="fas fa-paper-plane"></i> Kirim Notifikasi
                    </button>
                </div>
            </div>
            
            <!-- Settings Section -->
            <div class="content-section" id="settingsSection">
                <div class="broadcast-form">
                    <h3 style="margin-bottom: 1.5rem;">System Settings</h3>
                    <p style="color: var(--text-muted);">Settings akan segera hadir...</p>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Request Detail Modal -->
    <div class="modal-overlay" id="requestModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Detail Request</div>
                <button class="btn-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Dynamic -->
            </div>
            <div class="modal-footer" id="modalFooter">
                <!-- Dynamic -->
            </div>
        </div>
    </div>
    
    <script>
        const BASE_URL = window.location.origin + '/api';
        let adminKey = localStorage.getItem('adminKey') || '';
        let currentRequest = null;
        
        // Check if already logged in
        if (adminKey) {
            verifyLogin();
        }
        
        async function verifyLogin() {
            try {
                const res = await fetch(`${BASE_URL}/request?admin_key=${adminKey}&limit=1`);
                if (res.ok) {
                    showAdminPanel();
                    loadData();
                } else {
                    localStorage.removeItem('adminKey');
                    adminKey = '';
                }
            } catch {
                // Stay on login
            }
        }
        
        function login() {
            adminKey = document.getElementById('adminKey').value;
            if (!adminKey) return;
            
            localStorage.setItem('adminKey', adminKey);
            verifyLogin();
        }
        
        function logout() {
            localStorage.removeItem('adminKey');
            adminKey = '';
            location.reload();
        }
        
        function showAdminPanel() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminLayout').classList.add('active');
        }
        
        function showSection(section) {
            // Update nav
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');
            
            // Update content
            document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
            
            const titles = {
                dashboard: ['Dashboard', 'Overview sistem'],
                requests: ['Feature Requests', 'Kelola request dari user'],
                notifications: ['Send Notification', 'Kirim notifikasi ke user'],
                settings: ['Settings', 'Konfigurasi sistem']
            };
            
            document.getElementById('pageTitle').textContent = titles[section][0];
            document.getElementById('pageSubtitle').textContent = titles[section][1];
            document.getElementById(section + 'Section').classList.add('active');
        }
        
        async function loadData() {
            await Promise.all([
                loadStats(),
                loadRequests(),
                loadNotifications()
            ]);
        }
        
        async function loadStats() {
            try {
                const [requestRes, statusRes] = await Promise.all([
                    fetch(`${BASE_URL}/request?admin_key=${adminKey}&limit=1000`),
                    fetch(`${BASE_URL}/status`)
                ]);
                
                const requestData = await requestRes.json();
                const statusData = await statusRes.json();
                
                if (requestData.status) {
                    const requests = requestData.data.requests;
                    document.getElementById('totalRequests').textContent = requestData.data.total;
                    document.getElementById('pendingRequests').textContent = 
                        requests.filter(r => r.status === 'pending').length;
                    document.getElementById('completedRequests').textContent = 
                        requests.filter(r => r.status === 'completed').length;
                    document.getElementById('requestBadge').textContent = 
                        requests.filter(r => r.status === 'pending').length;
                }
                
                if (statusData.status) {
                    document.getElementById('totalApiCalls').textContent = 
                        statusData.data.totalRequests || 0;
                }
            } catch (err) {
                console.error('Load stats error:', err);
            }
        }
        
        async function loadRequests() {
            try {
                const res = await fetch(`${BASE_URL}/request?admin_key=${adminKey}&limit=50`);
                const data = await res.json();
                
                const list = document.getElementById('requestList');
                
                if (!data.status || data.data.requests.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon"><i class="fas fa-inbox"></i></div>
                            <p>Tidak ada request</p>
                        </div>
                    `;
                    return;
                }
                
                list.innerHTML = data.data.requests.map(req => `
                    <div class="request-item" onclick="showRequestDetail('${req.id}')">
                        <div class="request-status status-${req.status}"></div>
                        <div class="request-info">
                            <div class="request-title">${escapeHtml(req.feature)}</div>
                            <div class="request-meta">oleh ${escapeHtml(req.name)} • ${req.status}</div>
                        </div>
                        <div class="request-date">${timeAgo(req.createdAt)}</div>
                    </div>
                `).join('');
                
            } catch (err) {
                console.error('Load requests error:', err);
            }
        }
        
        async function showRequestDetail(id) {
            try {
                const res = await fetch(`${BASE_URL}/request?admin_key=${adminKey}&id=${id}`);
                const data = await res.json();
                
                if (!data.status) return;
                
                currentRequest = data.data;
                const req = data.data;
                
                document.getElementById('modalBody').innerHTML = `
                    <div class="detail-group">
                        <div class="detail-label">Request ID</div>
                        <div class="detail-value" style="font-family: monospace; color: var(--primary);">${req.id}</div>
                    </div>
                    <div class="detail-group">
                        <div class="detail-label">Nama</div>
                        <div class="detail-value">${escapeHtml(req.name)}</div>
                    </div>
                    <div class="detail-group">
                        <div class="detail-label">Fitur</div>
                        <div class="detail-value" style="font-weight: 600;">${escapeHtml(req.feature)}</div>
                    </div>
                    <div class="detail-group">
                        <div class="detail-label">Deskripsi</div>
                        <div class="detail-value">${escapeHtml(req.description) || '-'}</div>
                    </div>
                    ${req.code ? `
                    <div class="detail-group">
                        <div class="detail-label">Code</div>
                        <div class="code-block"><pre>${escapeHtml(req.code)}</pre></div>
                    </div>
                    ` : ''}
                    ${req.contact ? `
                    <div class="detail-group">
                        <div class="detail-label">Kontak</div>
                        <div class="detail-value">${escapeHtml(req.contact)}</div>
                    </div>
                    ` : ''}
                    <div class="detail-group">
                        <div class="detail-label">Status Saat Ini</div>
                        <div class="detail-value" style="text-transform: uppercase; color: var(--${getStatusColor(req.status)});">${req.status}</div>
                    </div>
                    ${req.adminReply ? `
                    <div class="detail-group">
                        <div class="detail-label">Reply Admin</div>
                        <div class="detail-value" style="background: rgba(99, 102, 241, 0.1); padding: 1rem; border-radius: 8px;">${escapeHtml(req.adminReply)}</div>
                    </div>
                    ` : ''}
                `;
                
                document.getElementById('modalFooter').innerHTML = `
                    <button class="btn btn-success" onclick="updateStatus('approved')">
                        <i class="fas fa-check"></i> Approve
                    </button>
                    <button class="btn btn-warning" onclick="updateStatus('in_progress')">
                        <i class="fas fa-spinner"></i> In Progress
                    </button>
                    <button class="btn btn-primary" onclick="updateStatus('completed')">
                        <i class="fas fa-check-double"></i> Complete
                    </button>
                    <button class="btn btn-error" onclick="updateStatus('rejected')">
                        <i class="fas fa-times"></i> Reject
                    </button>
                    <button class="btn btn-secondary" onclick="closeModal()">Tutup</button>
                `;
                
                document.getElementById('requestModal').classList.add('active');
                
            } catch (err) {
                console.error('Show detail error:', err);
            }
        }
        
        async function updateStatus(status) {
            if (!currentRequest) return;
            
            const reply = prompt('Tambahkan reply untuk user (opsional):');
            
            try {
                const res = await fetch(`${BASE_URL}/request`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        admin_key: adminKey,
                        id: currentRequest.id,
                        status: status,
                        adminReply: reply || null
                    })
                });
                
                const data = await res.json();
                
                if (data.status) {
                    closeModal();
                    loadRequests();
                    loadStats();
                    
                    // Show success notification
                    alert(`Status updated to ${status}`);
                }
            } catch (err) {
                alert('Failed to update status');
            }
        }
        
        function closeModal() {
            document.getElementById('requestModal').classList.remove('active');
            currentRequest = null;
        }
        
        async function loadNotifications() {
            try {
                const res = await fetch(`${BASE_URL}/notifications?admin_key=${adminKey}&limit=20`);
                const data = await res.json();
                
                const list = document.getElementById('notificationList');
                const indicator = document.getElementById('notifIndicator');
                
                if (!data.status || data.data.notifications.length === 0) {
                    list.innerHTML = '<div style="padding: 2rem; text-align: center; color: var(--text-muted);">No notifications</div>';
                    indicator.style.display = 'none';
                    return;
                }
                
                const unread = data.data.notifications.filter(n => !n.read).length;
                indicator.style.display = unread > 0 ? 'block' : 'none';
                
                list.innerHTML = data.data.notifications.map(n => `
                    <div class="notification-item ${n.read ? '' : 'unread'}" onclick="markRead('${n.id}')">
                        <div class="notification-icon">
                            <i class="fas ${n.type === 'new_request' ? 'fa-inbox' : 'fa-bell'}"></i>
                        </div>
                        <div class="notification-content">
                            <div class="notification-text">${escapeHtml(n.message)}</div>
                            <div class="notification-time">${timeAgo(n.createdAt)}</div>
                        </div>
                    </div>
                `).join('');
                
            } catch (err) {
                console.error('Load notifications error:', err);
            }
        }
        
        function toggleNotifications() {
            document.getElementById('notificationPanel').classList.toggle('active');
        }
        
        async function markRead(id) {
            try {
                await fetch(`${BASE_URL}/notifications`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                loadNotifications();
            } catch (err) {
                console.error('Mark read error:', err);
            }
        }
        
        async function sendNotification() {
            const title = document.getElementById('notifTitle').value.trim();
            const message = document.getElementById('notifMessage').value.trim();
            const type = document.getElementById('notifType').value;
            
            if (!title || !message) {
                alert('Judul dan pesan wajib diisi!');
                return;
            }
            
            try {
                const res = await fetch(`${BASE_URL}/notifications`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        admin_key: adminKey,
                        title,
                        message,
                        type
                    })
                });
                
                const data = await res.json();
                
                if (data.status) {
                    alert('Notifikasi berhasil dikirim!');
                    document.getElementById('notifTitle').value = '';
                    document.getElementById('notifMessage').value = '';
                } else {
                    alert('Gagal mengirim notifikasi: ' + data.message);
                }
            } catch (err) {
                alert('Error sending notification');
            }
        }
        
        function refreshData() {
            loadData();
            const btn = event.currentTarget;
            btn.querySelector('i').classList.add('fa-spin');
            setTimeout(() => btn.querySelector('i').classList.remove('fa-spin'), 1000);
        }
        
        // Utilities
        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
        
        function timeAgo(date) {
            const seconds = Math.floor((new Date() - new Date(date)) / 1000);
            const intervals = {
                year: 31536000,
                month: 2592000,
                week: 604800,
                day: 86400,
                hour: 3600,
                minute: 60,
                second: 1
            };
            
            for (const [unit, secondsInUnit] of Object.entries(intervals)) {
                const interval = Math.floor(seconds / secondsInUnit);
                if (interval >= 1) {
                    return `${interval} ${unit}${interval > 1 ? 's' : ''} ago`;
                }
            }
            return 'Just now';
        }
        
        function getStatusColor(status) {
            const colors = {
                pending: 'warning',
                approved: 'success',
                rejected: 'error',
                in_progress: 'accent',
                completed: 'primary'
            };
            return colors[status] || 'text-muted';
        }
        
        // Close modal on outside click
        document.getElementById('requestModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
